<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Spacing — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Spacing</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="space"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">4px base scale.</p>
        </div>
      </header>

      <ul class="space-list">
        <li>
          <button class="space-row" type="button" data-token="space-4">
            <span class="space-row__name">space-4</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-8">
            <span class="space-row__name">space-8</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-12">
            <span class="space-row__name">space-12</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-16">
            <span class="space-row__name">space-16</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-24">
            <span class="space-row__name">space-24</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-32">
            <span class="space-row__name">space-32</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-48">
            <span class="space-row__name">space-48</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
        <li>
          <button class="space-row" type="button" data-token="space-64">
            <span class="space-row__name">space-64</span>
            <span class="space-row__bar" data-space-bar></span>
            <span class="space-row__value"></span>
          </button>
        </li>
      </ul>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
