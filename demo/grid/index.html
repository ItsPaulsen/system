<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Grid — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Grid</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="bp,container,grid"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">Toggle the overlay; resize to watch it adapt.</p>
          <div class="toolbar">
            <label class="switch">
              <button
                class="switch__toggle"
                type="button"
                role="switch"
                aria-checked="false"
                data-grid-toggle
                aria-label="Toggle grid overlay"
              ></button>
              <span class="switch__label">Grid overlay</span>
            </label>
          </div>
        </div>
      </header>

      <h3 class="subhead">Values</h3>
      <p class="section-note">Preview values at each breakpoint.</p>
      <div class="tabs" role="tablist" data-grid-tabs>
        <button class="tabs__tab" type="button" role="tab" data-tab="mobile" aria-selected="false">
          Mobile
        </button>
        <button class="tabs__tab" type="button" role="tab" data-tab="tablet" aria-selected="false">
          Tablet
        </button>
        <button class="tabs__tab" type="button" role="tab" data-tab="desktop" aria-selected="false">
          Desktop
        </button>
      </div>
      <article class="token-list" data-grid-panel>
        <div class="token-list__row">
          <span class="token-list__name" data-grid-key="name"></span>
          <span class="token-list__value" data-grid-key="threshold"></span>
        </div>
        <div class="token-list__row">
          <span class="token-list__name"><code>grid-columns</code></span>
          <span class="token-list__value" data-grid-key="grid-columns"></span>
        </div>
        <div class="token-list__row">
          <span class="token-list__name"><code>grid-gutter</code></span>
          <span class="token-list__value" data-grid-key="grid-gutter"></span>
        </div>
        <div class="token-list__row">
          <span class="token-list__name"><code>grid-margin</code></span>
          <span class="token-list__value" data-grid-key="grid-margin"></span>
        </div>
        <div class="token-list__row">
          <span class="token-list__name"><code>container-max</code></span>
          <span class="token-list__value" data-grid-key="container-max"></span>
        </div>
      </article>
    </div>

    <div class="grid-overlay" data-grid-overlay hidden aria-hidden="true">
      <div class="grid-overlay__inner">
        <span class="grid-overlay__margin grid-overlay__margin--left">
          <span class="grid-overlay__margin-label" data-grid-margin-label></span>
        </span>
        <span class="grid-overlay__margin grid-overlay__margin--right">
          <span class="grid-overlay__margin-label" data-grid-margin-label></span>
        </span>
        <div class="grid-overlay__cols" data-grid-cols></div>
      </div>
    </div>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
