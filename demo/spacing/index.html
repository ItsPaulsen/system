<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Spacing — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Spacing</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="space"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">4px base scale.</p>
        </div>
      </header>

      <article class="token-list">
        <!-- Rendered rows share the token-list row markup; the copy icon is the
             same SVG pair as the preview cards to keep the shell dependency-free. -->
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-4">
          <span class="token-list__name">var(--space-4)</span>
          <span class="token-list__bar" data-space-bar></span>
          <button class="preview-card__copy" type="button" data-copy-declaration aria-label="Copy var(--space-4)">
            <svg class="icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-8">
          <span class="token-list__name">var(--space-8)</span>

            <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
        <!-- prettier-ignore -->

            <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
      </article>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
