<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Radii — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <h1>Radii</h1>
        <p class="lede">Corner rounding scale.</p>
      </header>

      <ul class="tile-grid">
        <li>
          <button class="tile" type="button" data-token="radius-sm">
            <span class="tile__demo" data-radius-demo></span>
            <span class="tile__name">radius-sm</span>
            <span class="tile__value"></span>
          </button>
        </li>
        <li>
          <button class="tile" type="button" data-token="radius-md">
            <span class="tile__demo" data-radius-demo></span>
            <span class="tile__name">radius-md</span>
            <span class="tile__value"></span>
          </button>
        </li>
        <li>
          <button class="tile" type="button" data-token="radius-lg">
            <span class="tile__demo" data-radius-demo></span>
            <span class="tile__name">radius-lg</span>
            <span class="tile__value"></span>
          </button>
        </li>
        <li>
          <button class="tile" type="button" data-token="radius-full">
            <span class="tile__demo" data-radius-demo></span>
            <span class="tile__name">radius-full</span>
            <span class="tile__value"></span>
          </button>
        </li>
      </ul>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
