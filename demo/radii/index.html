<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Radii — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Radii</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="radius"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">Corner rounding scale.</p>
        </div>
      </header>

      <div class="preview-grid">
        <section class="preview-block">
          <h3 class="subhead">Small</h3>
          <p class="section-note">Buttons, chips, tags.</p>
          <article class="preview-card" data-token="radius-sm">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-radius-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--radius-sm)</span>
                <span class="preview-card__value"></span>
              </div>
            </div>
          </article>
        </section>

        <section class="preview-block">
          <h3 class="subhead">Medium</h3>
          <p class="section-note">Cards, inputs, dialogs.</p>
          <article class="preview-card" data-token="radius-md">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-radius-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--radius-md)</span>
                <span class="preview-card__value"></span>
              </div>
            </div>
          </article>
        </section>

        <section class="preview-block">
          <h3 class="subhead">Large</h3>
          <p class="section-note">Hero surfaces, feature panels.</p>
          <article class="preview-card" data-token="radius-lg">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-radius-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--radius-lg)</span>
                <span class="preview-card__value"></span>
              </div>
            </div>
          </article>
        </section>

        <section class="preview-block">
          <h3 class="subhead">Full</h3>
          <p class="section-note">Avatars, pills, circular buttons.</p>
          <article class="preview-card" data-token="radius-full">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-radius-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--radius-full)</span>
                <span class="preview-card__value"></span>
              </div>
            </div>
          </article>
        </section>
      </div>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
