<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Demo — System</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <p class="eyebrow">Demo · Design</p>
        <h1>Demo project</h1>
        <p class="lede">
          A style guide for a project. One page per foundation — pick a topic from the sidebar.
          Click any value on those pages to copy it.
        </p>
        <div class="toolbar">
          <button class="btn" type="button" data-copy-css="/demo/tokens.css">
            Copy all tokens as CSS
          </button>
        </div>
      </header>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
