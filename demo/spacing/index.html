<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Spacing — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Spacing</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="space"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">4px base scale.</p>
        </div>
      </header>

      <article class="token-list">
        <!-- Rendered rows share the token-list row markup; the copy icon is the
             same SVG pair as the preview cards to keep the shell dependency-free. -->
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-4">
          <span class="token-list__name"><code>space-4</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-8">
          <span class="token-list__name"><code>space-8</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-12">
          <span class="token-list__name"><code>space-12</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-16">
          <span class="token-list__name"><code>space-16</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-24">
          <span class="token-list__name"><code>space-24</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-32">
          <span class="token-list__name"><code>space-32</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-48">
          <span class="token-list__name"><code>space-48</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
        <!-- prettier-ignore -->
        <div class="token-list__row" data-token="space-64">
          <span class="token-list__name"><code>space-64</code></span>
          <span class="token-list__bar" data-space-bar></span>
          <span class="token-list__value"></span>
        </div>
      </article>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
