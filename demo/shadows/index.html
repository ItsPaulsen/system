<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Shadows — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Shadows</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="shadow"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">Elevation depth scale.</p>
        </div>
      </header>

      <div class="preview-grid">
        <section class="preview-block">
          <h3 class="subhead">Small</h3>
          <p class="section-note">Cards resting on the page.</p>
          <article class="preview-card" data-token="shadow-sm">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-shadow-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--shadow-sm)</span>
                <span class="preview-card__value"></span>
              </div>
              <button
                class="preview-card__copy"
                type="button"
                data-copy-declaration
                aria-label="Copy --shadow-sm"
              >
                <svg
                  class="icon-copy"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg
                  class="icon-check"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </button>
            </div>
          </article>
        </section>

        <section class="preview-block">
          <h3 class="subhead">Medium</h3>
          <p class="section-note">Menus, dropdowns, popovers.</p>
          <article class="preview-card" data-token="shadow-md">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-shadow-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--shadow-md)</span>
                <span class="preview-card__value"></span>
              </div>
              <button
                class="preview-card__copy"
                type="button"
                data-copy-declaration
                aria-label="Copy --shadow-md"
              >
                <svg
                  class="icon-copy"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg
                  class="icon-check"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </button>
            </div>
          </article>
        </section>

        <section class="preview-block">
          <h3 class="subhead">Large</h3>
          <p class="section-note">Modals, drawers, overlays.</p>
          <article class="preview-card" data-token="shadow-lg">
            <div class="preview-card__demo">
              <span class="preview-card__chip" data-shadow-demo></span>
            </div>
            <div class="preview-card__meta">
              <div class="preview-card__meta-text">
                <span class="preview-card__name">var(--shadow-lg)</span>
                <span class="preview-card__value"></span>
              </div>
              <button
                class="preview-card__copy"
                type="button"
                data-copy-declaration
                aria-label="Copy --shadow-lg"
              >
                <svg
                  class="icon-copy"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg
                  class="icon-check"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </button>
            </div>
          </article>
        </section>
      </div>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
