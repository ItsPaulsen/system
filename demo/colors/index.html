<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Colors — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <div class="site-head__title">
            <h1>Colors</h1>
            <button
              class="btn"
              type="button"
              data-copy-css="/demo/tokens.css"
              data-copy-tokens="neutral,background,ink,primary,success,warning,danger,focus,overlay,fill"
            >
              Copy Tokens
            </button>
          </div>
          <p class="lede">
            Base, hover, active per family. Click any swatch to copy.
            <br /><em>Designer note: +23 hover / +31 active per RGB channel.</em>
          </p>
        </div>
      </header>

      <div class="preview-grid" data-palette-host></div>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
