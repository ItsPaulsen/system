<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Shadows — Demo</title>
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/demo/tokens.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="site-head__body">
          <h1>Shadows</h1>
          <p class="lede">Elevation depth scale.</p>
        </div>
        <button class="btn" type="button" data-copy-css="/demo/tokens.css">Copy Tokens</button>
      </header>

      <ul class="tile-grid">
        <li>
          <div class="tile" data-token="shadow-sm">
            <span class="tile__demo" data-shadow-demo></span>
            <span class="tile__name">shadow-sm</span>
            <span class="tile__desc">Cards resting on the page.</span>
            <span class="tile__value"></span>
          </div>
        </li>
        <li>
          <div class="tile" data-token="shadow-md">
            <span class="tile__demo" data-shadow-demo></span>
            <span class="tile__name">shadow-md</span>
            <span class="tile__desc">Menus, dropdowns, popovers.</span>
            <span class="tile__value"></span>
          </div>
        </li>
        <li>
          <div class="tile" data-token="shadow-lg">
            <span class="tile__demo" data-shadow-demo></span>
            <span class="tile__name">shadow-lg</span>
            <span class="tile__desc">Modals, drawers, overlays.</span>
            <span class="tile__value"></span>
          </div>
        </li>
      </ul>
    </div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
