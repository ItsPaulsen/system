<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>System</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e0e10;
      --text: #ededed;
      --muted: #8a8a8f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 500;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>System</h1>
    <p>Project reference pages are coming soon.</p>
  </main>
</body>
</html>
